</div>

</button>
<button class="p-2 text-on-surface-variant hover:bg-surface-variant rounded-full transition-colors" title="Redo">

</button>
<div class="w-px h-6 bg-outline-variant mx-1"></div>

<span class="font-title-md text-title-md">Files</span>

</button>
<div class="w-px h-4 bg-outline-variant/50 mx-1"></div>
<button class="p-2 text-on-surface-variant hover:bg-surface-variant rounded-full active:scale-95 transition-all">
